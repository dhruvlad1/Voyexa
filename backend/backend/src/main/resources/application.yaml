spring:
  config:
    import: optional:file:./backend/backend/env.properties

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

geoapify:
  base-url: https://api.geoapify.com/v1/geocode/autocomplete
  api-key: ${GEOAPIFY_API_KEY}
  limit: 10

gemini:
  api:
    planner-key: ${GEMINI_PLANNER_API_KEY}
    validator-key: ${GEMINI_VALIDATOR_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
