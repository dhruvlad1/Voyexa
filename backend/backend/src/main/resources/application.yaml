spring:
  config:
    import:
      - optional:file:./env.properties
      - optional:file:./backend/backend/env.properties

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

geoapify:
  base-url: https://api.geoapify.com/v1/geocode/autocomplete
  api-key: ${GEOAPIFY_API_KEY}
  limit: 10

gemini:
  api:
    # Master pool (planner can use all keys)
    keys: ${GEMINI_API_KEYS:${GEMINI_PLANNER_API_KEY:}}
    # Limited pool (validator/dashboard/alternatives use this)
    limited-keys: ${GEMINI_LIMITED_API_KEYS:${GEMINI_VALIDATOR_API_KEY:}}
    # Backward compatible legacy names
    planner-key: ${GEMINI_PLANNER_API_KEY:}
    validator-key: ${GEMINI_VALIDATOR_API_KEY:}
    # API Endpoint
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
    # Tuning parameters
    cooldown-seconds: ${GEMINI_COOLDOWN_SECONDS:30}
    max-attempts: ${GEMINI_MAX_ATTEMPTS:10}
    initial-backoff-ms: ${GEMINI_INITIAL_BACKOFF_MS:200}
    max-backoff-ms: ${GEMINI_MAX_BACKOFF_MS:1500}

pexels:
  api-key: ${PEXELS_API_KEY:YOUR_PEXELS_API_KEY}
